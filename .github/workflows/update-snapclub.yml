name: 'Mise à jour automatique SnapClub (Players & Contracts)'

on:
  workflow_dispatch:
  schedule:
    - cron: '30 9 * * *'
    - cron: '2 22 * * *'

jobs:
  update-snapclub-database:
    name: 'Exécuter SnapClub et Uploader sur R2 + MariaDB'
    runs-on: ubuntu-latest

    steps:
      - name: '1. Checkout du code'
        uses: actions/checkout@v4

      - name: '2. Setup Python 3.10'
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: '3. Installer les dépendances'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # On s'assure que le connecteur MariaDB est présent
          pip install mysql-connector-python 
      
      - name: '4. Lancer le script SnapClub et uploader'
        env:
          # Secrets Cloudflare R2
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          
          # Secrets MariaDB Oracle (À AJOUTER DANS GITHUB SECRETS)
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          echo "Lancement de SnapClub.py..."
          python ./SnapClub.py
          echo "Script SnapClub.py terminé."
