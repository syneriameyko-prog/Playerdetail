# Nom du workflow qui apparaîtra dans l'onglet "Actions" de votre dépôt GitHub
name: 'Mise à jour automatique SnapClub (Players & Contracts)'

# Déclencheurs du workflow
on:
  # Permet de le lancer manuellement depuis l'interface de GitHub (pour tester)
  workflow_dispatch:

  # Planification automatique
  schedule:
    # Exécution à 8h30 UTC tous les jours
    - cron: '30 9 * * *'
    
    # Exécution à 21h02 UTC tous les jours
    - cron: '2 22 * * *'

# Définition des tâches à exécuter
jobs:
  update-snapclub-database:
    # Nom de la tâche
    name: 'Exécuter SnapClub et Uploader sur R2'
    
    # Machine virtuelle à utiliser (fournie par GitHub)
    runs-on: ubuntu-latest

    # Étapes de la tâche
    steps:
      # Étape 1 : Récupérer le code de votre dépôt
      - name: '1. Checkout du code'
        uses: actions/checkout@v4

      # Étape 2 : Configurer l'environnement Python
      - name: '2. Setup Python 3.10'
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      # Étape 3 : Installer les librairies Python nécessaires
      - name: '3. Installer les dépendances'
        run: pip install -r requirements.txt
      
      # Étape 4 : Exécuter le script principal SnapClub.py
      - name: '4. Lancer le script SnapClub et uploader'
        # On injecte les secrets R2 dans l'environnement du script.
        # Notre module r2_uploader.py saura les lire automatiquement.
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          echo "Lancement de SnapClub.py..."
          # Adaptez le chemin si votre script est dans un sous-dossier (ex: python ./1_Scripts/SnapClub.py)
          python ./SnapClub.py
          echo "Script SnapClub.py terminé."
